{% extends "base.html" %}

{% block title %}Create Room{% endblock %}

{% block content %}

    <form action="{{ url_for('routes.create_room') }}" method="POST">
        <div>
            <label for="room-name">Room Name:</label>
            <input type="text" id="room-name" name="room-name" placeholder="e.g.general-chat" required>
        </div>
        <button type="submit">Create Room</button>
    </form>

{% endblock %}
